<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }
        .game-container { max-width: 1100px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats {
            display: flex; justify-content: center; gap: 30px;
            background: rgba(255, 107, 107, 0.1); padding: 12px 25px; border-radius: 12px;
            border: 1px solid rgba(255, 107, 107, 0.3); margin-top: 15px;
        }
        .stat { text-align: center; }
        .stat-label { font-size: 0.75rem; color: #888; text-transform: uppercase; }
        .stat-value { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; color: #ff6b6b; }

        .scenario {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.1), rgba(255, 217, 61, 0.1));
            border: 1px solid rgba(255, 107, 107, 0.3); border-radius: 15px; padding: 20px; margin-bottom: 20px;
        }
        .scenario h2 { font-family: 'Orbitron', sans-serif; color: #ffd93d; font-size: 1.1rem; margin-bottom: 10px; }
        .scenario p { color: #ccc; line-height: 1.6; }

        .workspace { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .panel {
            background: rgba(0, 0, 0, 0.3); border-radius: 12px; padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .panel h3 { font-family: 'Orbitron', sans-serif; color: #00d4ff; font-size: 0.95rem; margin-bottom: 15px; }

        .account {
            background: rgba(0, 0, 0, 0.4); border-radius: 8px; padding: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .account-name { color: #fff; font-weight: 600; }
        .account-balance { font-family: 'Orbitron', sans-serif; color: #00ff88; font-size: 1.1rem; }
        .account-balance.negative { color: #ff6b6b; }

        .transaction-log {
            background: rgba(0, 0, 0, 0.5); border-radius: 8px; padding: 10px;
            font-family: 'Fira Code', monospace; font-size: 0.85rem;
            max-height: 200px; overflow-y: auto;
        }
        .log-entry { padding: 5px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .log-entry.commit { color: #00ff88; }
        .log-entry.rollback { color: #ff6b6b; }
        .log-entry.pending { color: #ffd93d; }

        .controls {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px;
        }
        .btn {
            padding: 12px; border: none; border-radius: 8px;
            font-family: 'Orbitron', sans-serif; font-size: 0.85rem;
            cursor: pointer; transition: all 0.3s; text-transform: uppercase;
        }
        .btn-begin { background: linear-gradient(135deg, #00d4ff, #7c3aed); color: #0a0a1a; }
        .btn-commit { background: linear-gradient(135deg, #00ff88, #00d4ff); color: #0a0a1a; }
        .btn-rollback { background: linear-gradient(135deg, #ff6b6b, #ff8e53); color: #0a0a1a; }
        .btn-transfer { background: rgba(255, 217, 61, 0.2); color: #ffd93d; border: 1px solid rgba(255, 217, 61, 0.4); }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .acid-display {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px;
        }
        .acid-box {
            background: rgba(0, 0, 0, 0.3); border-radius: 8px; padding: 15px; text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.1); transition: all 0.3s;
        }
        .acid-box.active { border-color: #00ff88; background: rgba(0, 255, 136, 0.1); }
        .acid-box h4 { font-family: 'Orbitron', sans-serif; color: #7c3aed; font-size: 1.2rem; }
        .acid-box p { font-size: 0.75rem; color: #888; margin-top: 5px; }

        .feedback {
            text-align: center; padding: 15px; border-radius: 10px;
            font-family: 'Orbitron', sans-serif; display: none;
        }
        .feedback.success { display: block; background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .feedback.error { display: block; background: rgba(255, 100, 100, 0.2); color: #ff6b6b; }

        .transfer-form {
            display: none; background: rgba(124, 58, 237, 0.1); border-radius: 10px; padding: 15px;
            margin-bottom: 15px; border: 1px solid rgba(124, 58, 237, 0.3);
        }
        .transfer-form.active { display: block; }
        .transfer-form input, .transfer-form select {
            padding: 10px; margin: 5px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.4); color: #fff; font-family: 'Rajdhani', sans-serif;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <header class="header">
            <h1>🔄 Transaction Simulator</h1>
            <div class="stats">
                <div class="stat"><span class="stat-label">Score</span><div class="stat-value" id="score">0</div></div>
                <div class="stat"><span class="stat-label">Level</span><div class="stat-value" id="level">1</div></div>
                <div class="stat"><span class="stat-label">Completed</span><div class="stat-value" id="completed">0</div></div>
            </div>
        </header>

        <div class="acid-display">
            <div class="acid-box" id="acid-a"><h4>A</h4><p>Atomicity</p></div>
            <div class="acid-box" id="acid-c"><h4>C</h4><p>Consistency</p></div>
            <div class="acid-box" id="acid-i"><h4>I</h4><p>Isolation</p></div>
            <div class="acid-box" id="acid-d"><h4>D</h4><p>Durability</p></div>
        </div>

        <div class="scenario">
            <h2 id="scenario-title">💰 Bank Transfer Scenario</h2>
            <p id="scenario-desc">Transfer $500 from Account A to Account B. Ensure the transaction maintains ACID properties!</p>
        </div>

        <div class="workspace">
            <div class="panel">
                <h3>📊 Account Balances</h3>
                <div id="accounts"></div>
            </div>
            <div class="panel">
                <h3>📝 Transaction Log</h3>
                <div class="transaction-log" id="log"></div>
            </div>
        </div>

        <div class="transfer-form" id="transfer-form">
            <select id="from-account"></select>
            <span style="color:#fff;">→</span>
            <select id="to-account"></select>
            <input type="number" id="amount" placeholder="Amount" min="1">
            <button class="btn btn-transfer" onclick="game.executeTransfer()">Execute</button>
        </div>

        <div class="controls">
            <button class="btn btn-begin" id="begin-btn">▶ BEGIN</button>
            <button class="btn btn-transfer" id="transfer-btn" disabled>💸 TRANSFER</button>
            <button class="btn btn-commit" id="commit-btn" disabled>✓ COMMIT</button>
            <button class="btn btn-rollback" id="rollback-btn" disabled>↩ ROLLBACK</button>
        </div>

        <div class="feedback" id="feedback"></div>
    </div>

    <script>
        class TransactionSimulator {
            constructor() {
                this.score = 0;
                this.level = 1;
                this.completed = 0;
                this.inTransaction = false;
                this.pendingChanges = [];
                this.originalState = {};
                
                this.scenarios = this.generateScenarios();
                this.currentIndex = 0;
                
                this.bindEvents();
                this.loadScenario();
            }
            
            generateScenarios() {
                return [
                    {
                        title: "💰 Simple Bank Transfer",
                        desc: "Transfer $500 from Account A to Account B. Use BEGIN, TRANSFER, then COMMIT to complete.",
                        accounts: { "Account A": 1000, "Account B": 500 },
                        goal: { type: "transfer", from: "Account A", to: "Account B", amount: 500 },
                        xp: 100
                    },
                    {
                        title: "🔄 Multi-Account Transfer",
                        desc: "Account A sends $200 to B, and $300 to C. Both must succeed or both fail!",
                        accounts: { "Account A": 1000, "Account B": 200, "Account C": 300 },
                        goal: { type: "multi", transfers: [
                            { from: "Account A", to: "Account B", amount: 200 },
                            { from: "Account A", to: "Account C", amount: 300 }
                        ]},
                        xp: 150
                    },
                    {
                        title: "⚠️ Insufficient Funds Test",
                        desc: "Try to transfer $2000 from Account A (has $1000). The system should ROLLBACK!",
                        accounts: { "Account A": 1000, "Account B": 500 },
                        goal: { type: "rollback", from: "Account A", to: "Account B", amount: 2000 },
                        xp: 150
                    },
                    {
                        title: "🏦 Salary Distribution",
                        desc: "Company Account distributes $1000 each to Employee A and Employee B.",
                        accounts: { "Company": 5000, "Employee A": 100, "Employee B": 100 },
                        goal: { type: "multi", transfers: [
                            { from: "Company", to: "Employee A", amount: 1000 },
                            { from: "Company", to: "Employee B", amount: 1000 }
                        ]},
                        xp: 175
                    }
                ];
            }
            
            bindEvents() {
                document.getElementById('begin-btn').onclick = () => this.beginTransaction();
                document.getElementById('transfer-btn').onclick = () => this.showTransferForm();
                document.getElementById('commit-btn').onclick = () => this.commit();
                document.getElementById('rollback-btn').onclick = () => this.rollback();
            }
            
            loadScenario() {
                if (this.currentIndex >= this.scenarios.length) {
                    this.currentIndex = 0;
                    this.level++;
                }
                
                const scenario = this.scenarios[this.currentIndex];
                document.getElementById('scenario-title').textContent = scenario.title;
                document.getElementById('scenario-desc').textContent = scenario.desc;
                
                this.accounts = { ...scenario.accounts };
                this.originalState = { ...scenario.accounts };
                this.renderAccounts();
                this.clearLog();
                this.resetButtons();
                this.resetAcid();
                this.hideFeedback();
                document.getElementById('transfer-form').classList.remove('active');
                
                // Populate dropdowns
                const fromSelect = document.getElementById('from-account');
                const toSelect = document.getElementById('to-account');
                const options = Object.keys(this.accounts).map(a => `<option value="${a}">${a}</option>`).join('');
                fromSelect.innerHTML = options;
                toSelect.innerHTML = options;
                
                this.updateStats();
            }
            
            renderAccounts() {
                const container = document.getElementById('accounts');
                container.innerHTML = Object.entries(this.accounts).map(([name, balance]) => `
                    <div class="account">
                        <span class="account-name">${name}</span>
                        <span class="account-balance ${balance < 0 ? 'negative' : ''}">$${balance}</span>
                    </div>
                `).join('');
            }
            
            beginTransaction() {
                this.inTransaction = true;
                this.pendingChanges = [];
                this.originalState = { ...this.accounts };
                
                this.addLog('BEGIN TRANSACTION', 'pending');
                this.highlightAcid('a');
                
                document.getElementById('begin-btn').disabled = true;
                document.getElementById('transfer-btn').disabled = false;
                document.getElementById('commit-btn').disabled = false;
                document.getElementById('rollback-btn').disabled = false;
            }
            
            showTransferForm() {
                document.getElementById('transfer-form').classList.toggle('active');
            }
            
            executeTransfer() {
                if (!this.inTransaction) return;
                
                const from = document.getElementById('from-account').value;
                const to = document.getElementById('to-account').value;
                const amount = parseInt(document.getElementById('amount').value);
                
                if (!amount || amount <= 0) {
                    this.showFeedback('Enter a valid amount!', 'error');
                    return;
                }
                
                if (from === to) {
                    this.showFeedback('Cannot transfer to same account!', 'error');
                    return;
                }
                
                // Execute transfer (temporarily)
                this.accounts[from] -= amount;
                this.accounts[to] += amount;
                this.pendingChanges.push({ from, to, amount });
                
                this.addLog(`TRANSFER $${amount}: ${from} → ${to}`, 'pending');
                this.renderAccounts();
                this.highlightAcid('c');
                
                document.getElementById('transfer-form').classList.remove('active');
                document.getElementById('amount').value = '';
            }
            
            commit() {
                if (!this.inTransaction) return;
                
                // Check consistency - no negative balances
                const hasNegative = Object.values(this.accounts).some(b => b < 0);
                
                if (hasNegative) {
                    this.showFeedback('Cannot commit: Negative balance detected! Use ROLLBACK.', 'error');
                    return;
                }
                
                const scenario = this.scenarios[this.currentIndex];
                
                // Check if goal achieved
                let goalMet = false;
                if (scenario.goal.type === 'transfer') {
                    const g = scenario.goal;
                    goalMet = this.pendingChanges.some(c => c.from === g.from && c.to === g.to && c.amount === g.amount);
                } else if (scenario.goal.type === 'multi') {
                    goalMet = scenario.goal.transfers.every(g => 
                        this.pendingChanges.some(c => c.from === g.from && c.to === g.to && c.amount === g.amount)
                    );
                } else if (scenario.goal.type === 'rollback') {
                    // Should have rolled back, not committed
                    goalMet = false;
                }
                
                if (goalMet) {
                    this.addLog('COMMIT - Transaction successful!', 'commit');
                    this.highlightAcid('d');
                    this.score += scenario.xp;
                    this.completed++;
                    this.showFeedback(`✓ Transaction committed! +${scenario.xp} XP`, 'success');
                    this.reportScore();
                    
                    setTimeout(() => {
                        this.currentIndex++;
                        this.inTransaction = false;
                        this.loadScenario();
                    }, 2000);
                } else {
                    this.addLog('COMMIT - Success but goal not achieved', 'commit');
                    this.showFeedback('Transaction committed, but that wasn\'t the goal. Try again!', 'error');
                    setTimeout(() => {
                        this.inTransaction = false;
                        this.loadScenario();
                    }, 2000);
                }
                
                this.updateStats();
            }
            
            rollback() {
                if (!this.inTransaction) return;
                
                this.accounts = { ...this.originalState };
                this.renderAccounts();
                this.addLog('ROLLBACK - Changes reverted', 'rollback');
                this.highlightAcid('a');
                
                const scenario = this.scenarios[this.currentIndex];
                
                if (scenario.goal.type === 'rollback') {
                    this.score += scenario.xp;
                    this.completed++;
                    this.showFeedback(`✓ Correct! Rollback was needed. +${scenario.xp} XP`, 'success');
                    this.reportScore();
                    
                    setTimeout(() => {
                        this.currentIndex++;
                        this.inTransaction = false;
                        this.loadScenario();
                    }, 2000);
                } else {
                    this.showFeedback('Transaction rolled back. Try again to complete the goal.', 'error');
                }
                
                this.inTransaction = false;
                this.resetButtons();
                this.updateStats();
            }
            
            addLog(message, type) {
                const log = document.getElementById('log');
                log.innerHTML += `<div class="log-entry ${type}">${new Date().toLocaleTimeString()} - ${message}</div>`;
                log.scrollTop = log.scrollHeight;
            }
            
            clearLog() {
                document.getElementById('log').innerHTML = '';
            }
            
            highlightAcid(letter) {
                document.getElementById(`acid-${letter}`).classList.add('active');
            }
            
            resetAcid() {
                ['a', 'c', 'i', 'd'].forEach(l => document.getElementById(`acid-${l}`).classList.remove('active'));
            }
            
            resetButtons() {
                document.getElementById('begin-btn').disabled = false;
                document.getElementById('transfer-btn').disabled = true;
                document.getElementById('commit-btn').disabled = true;
                document.getElementById('rollback-btn').disabled = true;
            }
            
            showFeedback(msg, type) {
                const fb = document.getElementById('feedback');
                fb.textContent = msg;
                fb.className = `feedback ${type}`;
            }
            
            hideFeedback() {
                document.getElementById('feedback').className = 'feedback';
            }
            
            updateStats() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('completed').textContent = this.completed;
            }
            
            reportScore() {
                if (window.parent !== window) {
                    window.parent.postMessage({ type: 'GAME_SCORE', game: 'transaction-simulator', score: this.score }, '*');
                }
            }
        }
        
        let game;
        document.addEventListener('DOMContentLoaded', () => { game = new TransactionSimulator(); });
    </script>
</body>
</html>
